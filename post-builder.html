<!doctype html>
<html lang="zh-CN" class="auth-pending">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卖号资产说明台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./site-auth.css?v=20260709-auth1" />
    <link rel="stylesheet" href="./post-builder.css" />
    <script src="./site-auth.js?v=20260709-auth1" defer></script>
  </head>
  <body>
    <main class="post-shell">
      <aside class="post-rail" aria-label="发帖导航">
        <div class="brand-lockup">
          <div class="brand-mark">帖</div>
          <div>
            <h1>卖号资产说明台</h1>
            <p>选资产 / 生成说明 / 复制</p>
          </div>
        </div>

        <section class="rail-panel">
          <label class="field-label" for="searchInput">素材搜索</label>
          <input id="searchInput" class="field" type="search" placeholder="宠物、技能、目录" autocomplete="off" />
        </section>

        <section class="rail-panel">
          <div class="panel-title">目录</div>
          <div id="folderFilters" class="filter-grid" aria-label="目录筛选"></div>
        </section>

        <section class="rail-panel">
          <div class="panel-title">快捷选择</div>
          <div class="action-grid">
            <button class="soft-button" type="button" data-preset="all">全量资产</button>
            <button class="soft-button" type="button" data-preset="starter">推荐首发</button>
            <button class="soft-button" type="button" data-preset="visible">选当前</button>
            <button class="soft-button" type="button" data-preset="clear">清空</button>
          </div>
        </section>

        <section class="rail-panel stats-card" aria-label="已选统计">
          <div><strong id="selectedCount">0</strong><span>记录</span></div>
          <div><strong id="selectedShotCount">0</strong><span>图片</span></div>
        </section>

        <div class="rail-links" aria-label="相关入口">
          <a href="./pet-recognition.html">查询台<span>打开</span></a>
          <a href="./index.html">技能库<span>打开</span></a>
        </div>
      </aside>

      <section class="post-page">
        <header class="topbar">
          <div>
            <h1>卖号资产说明编辑台</h1>
            <p class="lead">从已识别截图里生成完整资产说明，方便发出售帖。</p>
          </div>
          <div class="top-actions">
            <button id="copyPostButton" class="primary-button" type="button">复制正文</button>
            <button id="copyImageListButton" class="ghost-button" type="button">复制图片清单</button>
          </div>
        </header>

        <section class="workspace">
          <section class="material-panel" aria-label="素材池">
            <div class="section-head">
              <div>
                <h2>素材池</h2>
                <p id="materialSummary">正在读取记录。</p>
              </div>
              <label class="toggle-line">
                <input id="selectedOnlyToggle" type="checkbox" />
                <span>只看已选</span>
              </label>
            </div>
            <div id="petFilters" class="pet-filter-row" aria-label="宠物筛选"></div>
            <div id="recordList" class="record-list" aria-live="polite"></div>
          </section>

          <aside class="builder-panel" aria-label="帖子编辑">
            <section class="composer-card">
              <div class="section-head compact">
                <div>
                  <h2>说明设置</h2>
                  <p>用途、标题、开头和输出格式。</p>
                </div>
              </div>

              <div class="mode-tabs" role="tablist" aria-label="文案用途">
                <button class="mode-tab active" type="button" data-mode="sale" role="tab" aria-selected="true">卖号资产</button>
                <button class="mode-tab" type="button" data-mode="record" role="tab" aria-selected="false">记录贴</button>
              </div>

              <label class="field-group">
                <span class="field-label">标题</span>
                <input id="postTitleInput" class="field" type="text" />
              </label>

              <label class="field-group">
                <span class="field-label">开头</span>
                <textarea id="introInput" class="field textarea small"></textarea>
              </label>

              <div class="setting-grid" aria-label="输出选项">
                <label class="check-row"><input id="includeStatsInput" type="checkbox" checked /> 面板摘要</label>
                <label class="check-row"><input id="includeSkillsInput" type="checkbox" checked /> 技能摘要</label>
                <label class="check-row"><input id="includeNotesInput" type="checkbox" checked /> 看点一句话</label>
                <label class="check-row"><input id="allShotsInput" type="checkbox" checked /> 每组双图</label>
              </div>

              <div class="format-tabs" role="tablist" aria-label="输出格式">
                <button class="format-tab active" type="button" data-format="markdown" role="tab" aria-selected="true">Markdown</button>
                <button class="format-tab" type="button" data-format="plain" role="tab" aria-selected="false">纯文本</button>
              </div>
            </section>

            <section class="composer-card output-card">
              <div class="section-head compact">
                <div>
                  <h2>正文预览</h2>
                  <p id="outputSummary">等待选择素材。</p>
                </div>
              </div>
              <textarea id="postOutput" class="field textarea output" spellcheck="false"></textarea>
              <p id="copyStatus" class="copy-status" aria-live="polite"></p>
            </section>

            <section class="composer-card">
              <div class="section-head compact">
                <div>
                  <h2>图片清单</h2>
                  <p id="imageListSummary">等待选择素材。</p>
                </div>
              </div>
              <div id="imageList" class="image-list"></div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <script src="./pet-recognition-data.js"></script>
    <script src="./post-builder.js"></script>
  </body>
</html>
