<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幻唐志工具台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">技</div>
          <div>
            <h1>幻唐志工具台</h1>
            <p>技能图标 / 神兽排期</p>
          </div>
        </div>

        <section class="panel">
          <label class="search-label" for="searchInput">当前分类搜索</label>
          <input id="searchInput" type="search" placeholder="搜索技能名、状态或备注" autocomplete="off" />
        </section>

        <section class="panel stats-panel">
          <div>
            <span id="totalCount">0</span>
            <small>技能</small>
          </div>
          <div>
            <span id="categoryCount">0</span>
            <small>分类</small>
          </div>
        </section>

        <section class="panel note-panel">
          <h2>图标库状态</h2>
          <p>技能按兽决、御兽、强化技能分组。这里用于快速查图标、名称和识别备注。</p>
        </section>

        <section class="panel portal-panel">
          <h2>神兽任务查询</h2>
          <p>查看 1蛇、2蛇、马的成本、任务排期和账号资源，手机和电脑都可打开。</p>
          <a class="portal-link" href="./pet-recognition.html">打开神兽查询台</a>
          <a class="portal-link secondary" href="./post-builder.html">打开记录贴发图台</a>
        </section>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <h2>技能图标库</h2>
            <p>来源：<code>图片/技能库</code>。先选分类，再按名称、状态或备注过滤。</p>
          </div>
          <div class="top-actions">
            <a class="top-link" href="./post-builder.html">记录贴发图台</a>
            <a class="top-link" href="./pet-recognition.html">神兽查询台</a>
            <a class="top-link secondary" href="https://github.com/Tlyyy/sw" target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </header>

        <div id="cards" class="cards" aria-live="polite"></div>
      </section>
    </main>

    <script src="./skill-library.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
