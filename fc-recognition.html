<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC 图片逐张识别记录</title>
    <style>
      :root {
        --bg: #eef5fb;
        --surface: #ffffff;
        --surface-strong: #f7fbff;
        --text: #142232;
        --muted: #66788d;
        --line: #d9e6f2;
        --blue: #2f86d9;
        --blue-strong: #1267ba;
        --green: #2f9a69;
        --gold: #b87916;
        --red: #bd4545;
        --shadow: 0 18px 45px rgba(35, 76, 120, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(circle at 18% 8%, #d9ecff 0, transparent 30%), var(--bg);
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      }

      .page {
        width: min(1440px, calc(100% - 36px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 20px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.2;
      }

      .lead {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.7;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .search {
        width: 280px;
        height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .stat {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .stat strong {
        display: block;
        font-size: 28px;
        line-height: 1;
      }

      .stat span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .notice {
        padding: 14px 16px;
        margin-bottom: 18px;
        border: 1px solid #ead19b;
        border-radius: 8px;
        background: #fff9e8;
        color: #76500b;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .record {
        display: grid;
        grid-template-columns: minmax(420px, 560px) minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .shots {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .shot {
        position: relative;
        display: grid;
        gap: 6px;
        align-content: start;
      }

      .shot img {
        width: 100%;
        border: 1px solid #bcd6ec;
        border-radius: 6px;
        background: #d7ecff;
        image-rendering: auto;
      }

      .shot-id {
        position: absolute;
        right: 8px;
        top: 8px;
        display: inline-grid;
        place-items: center;
        min-width: 30px;
        height: 26px;
        padding: 0 7px;
        border-radius: 6px;
        color: #fff;
        background: rgba(21, 59, 97, 0.92);
        font-size: 12px;
        font-weight: 800;
      }

      .file {
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .info {
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .record-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .index {
        display: inline-grid;
        place-items: center;
        min-width: 34px;
        height: 30px;
        padding: 0 8px;
        border-radius: 6px;
        color: #fff;
        background: #153b61;
        font-weight: 800;
      }

      .pet h2 {
        font-size: 22px;
        line-height: 1.25;
      }

      .pet p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 28px;
        padding: 0 8px;
        border: 1px solid #c8ddec;
        border-radius: 6px;
        color: #285275;
        background: #f5fbff;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .tag.warning {
        border-color: #e7b4a9;
        color: #9d3f33;
        background: #fff3ef;
      }

      .skill-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .numbers {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .number-panel {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfdff;
      }

      .number-panel h3 {
        margin: 0 0 8px;
        color: #285275;
        font-size: 13px;
      }

      .number-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 4px 0;
        border-top: 1px solid #edf3f9;
        font-size: 12px;
        line-height: 1.25;
      }

      .number-row:first-of-type {
        border-top: 0;
      }

      .number-row span:first-child {
        color: var(--muted);
      }

      .number-row span:last-child {
        font-weight: 800;
        text-align: right;
      }

      .skills {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .skill {
        min-height: 42px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-strong);
        font-size: 13px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .skill.empty {
        color: #8aa0b6;
        background: #eef5fb;
      }

      .skill.pending {
        border-color: #edc4ba;
        color: #8f352b;
        background: #fff6f3;
        font-weight: 700;
      }

      .same {
        padding: 12px;
        border: 1px dashed #c5d9ea;
        border-radius: 8px;
        color: var(--muted);
        background: #f8fcff;
        line-height: 1.6;
      }

      .sources {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      mark {
        padding: 0 3px;
        border-radius: 4px;
        color: inherit;
        background: #ffef9d;
      }

      @media (max-width: 1080px) {
        .record {
          grid-template-columns: 1fr;
        }

        .shot img {
          max-width: 560px;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 1440px);
          padding-top: 18px;
        }

        .topbar,
        .stats {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: stretch;
        }

        .search {
          width: 100%;
        }

        .skills {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .numbers {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      const inheritedSkills = (record) => {
        if (record.skills) return record.skills;
        const sourceId = record.same.match(/同\s+(\d+)/)?.[1];
        return records.find((item) => item.id === sourceId)?.skills || [];
      };

      const isPending = (text) => text.includes("待确认") || text.includes("疑似");
      const imagePath = (file) => `./图片/FC/${file}`;
      const isCountedSkill = (skill) =>
        skill !== "空" &&
        !skill.includes("(符)") &&
        !skill.includes("(驭)") &&
        !skill.includes("强化") &&
        !skill.includes("之心") &&
        !skill.startsWith("觉醒");

      function buildGroups() {
        const groups = [];
        const byId = new Map();
        records.forEach((record) => {
          if (record.skipped) return;
          const sourceId = record.same?.match(/同\s+(\d+)/)?.[1];
          if (sourceId && byId.has(sourceId)) {
            byId.get(sourceId).shots.push({
              id: record.id,
              file: record.file,
              note: record.same,
            });
            return;
          }

          const group = {
            id: record.id,
            pet: record.pet,
            meta: record.meta,
            heart: record.heart,
            stats: record.stats,
            skills: inheritedSkills(record),
            shots: [
              {
                id: record.id,
                file: record.file,
                note: "主截图",
              },
            ],
          };
          groups.push(group);
          byId.set(record.id, group);
        });
        return groups;
      }

      const groups = buildGroups();

      function highlight(text, query) {
        if (!query) return text;
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(new RegExp(safe, "gi"), (match) => `<mark>${match}</mark>`);
      }

      function statsSearchText(stats) {
        if (!stats) return [];
        return [...stats.panel, ...stats.points, ...stats.aptitude, ...(stats.growth || [])].flat();
      }

      function renderNumberPanel(title, rows, query) {
        return `<section class="number-panel">
          <h3>${title}</h3>
          ${rows.map(([label, value]) => `<div class="number-row"><span>${highlight(label, query)}</span><span>${highlight(value, query)}</span></div>`).join("")}
        </section>`;
      }

      function renderStats(stats, query) {
        if (!stats) return "";
        return `<div class="numbers">
          ${renderNumberPanel("面板", stats.panel, query)}
          ${renderNumberPanel("属性点", stats.points, query)}
          ${renderNumberPanel("资质 / 寿命", stats.aptitude, query)}
          ${stats.growth ? renderNumberPanel("养成情况", stats.growth, query) : ""}
        </div>`;
      }

      function renderGroup(group, query = "") {
        const pending = group.skills.some(isPending);
        const skillCount = group.skills.filter(isCountedSkill).length;
        const shotsHtml = group.shots
          .map(
            (shot) => `<div class="shot">
              <span class="shot-id">${shot.id}</span>
              <img src="${imagePath(shot.file)}" alt="${group.pet} ${shot.file}" loading="lazy" />
              <div class="file">${highlight(shot.file, query)}</div>
            </div>`
          )
          .join("");
        const skillHtml = `<div class="skills">${group.skills
          .map((skill) => {
            const classes = ["skill"];
            if (skill === "空") classes.push("empty");
            if (isPending(skill)) classes.push("pending");
            return `<div class="${classes.join(" ")}">${highlight(skill, query)}</div>`;
          })
          .join("")}</div>`;

        return `<article class="record" data-search="${[
          group.id,
          group.pet,
          group.meta,
          group.heart || "",
          `技能数 ${skillCount}`,
          ...group.shots.flatMap((shot) => [shot.id, shot.file, shot.note]),
          ...statsSearchText(group.stats),
          ...group.skills,
        ].join(" ")}">
          <div class="shots">
            ${shotsHtml}
          </div>
          <div class="info">
            <div class="record-head">
              <div class="pet">
                <h2>${highlight(group.pet, query)}</h2>
                <p>${highlight(group.meta, query)}${group.heart ? `｜心：${highlight(group.heart, query)}` : ""}</p>
              </div>
              <span class="index">${group.id}</span>
            </div>
            <div class="skill-meta">
              <div class="tag ${pending ? "warning" : ""}">${pending ? "含待确认" : "已识别"}</div>
              <div class="tag">技能数 ${skillCount}</div>
            </div>
            <p class="sources">截图来源：${group.shots.map((shot) => highlight(`${shot.id} ${shot.file}`, query)).join("；")}</p>
            ${renderStats(group.stats, query)}
            ${skillHtml}
          </div>
        </article>`;
      }

      function render() {
        const query = document.getElementById("searchInput").value.trim();
        const queryLower = query.toLowerCase();
        const visible = groups.filter((group) => {
          if (!queryLower) return true;
          const text = [
            group.id,
            group.pet,
            group.meta,
            group.heart || "",
            `技能数 ${group.skills.filter(isCountedSkill).length}`,
            ...group.shots.flatMap((shot) => [shot.id, shot.file, shot.note]),
            ...statsSearchText(group.stats),
            ...group.skills,
          ]
            .join(" ")
            .toLowerCase();
          return text.includes(queryLower);
        });
        document.getElementById("records").innerHTML = visible.map((group) => renderGroup(group, query)).join("");
        document.getElementById("groupCount").textContent = visible.length;
        document.getElementById("shotCount").textContent = visible.reduce((sum, group) => sum + group.shots.length, 0);
        document.getElementById("pendingCount").textContent = groups.filter((group) => group.skills.some(isPending)).length;
      }

      document.getElementById("searchInput").addEventListener("input", render);
      render();
    </script>
