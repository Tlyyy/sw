<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物图片识别总览</title>
    <style>
      :root {
        --bg: #eef5fb;
        --surface: #ffffff;
        --surface-strong: #f7fbff;
        --text: #142232;
        --muted: #66788d;
        --line: #d9e6f2;
        --blue: #2f86d9;
        --blue-strong: #1267ba;
        --green: #2f9a69;
        --gold: #b87916;
        --red: #bd4545;
        --shadow: 0 18px 45px rgba(35, 76, 120, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(circle at 18% 8%, #d9ecff 0, transparent 30%), var(--bg);
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      }

      .page {
        width: min(1440px, calc(100% - 36px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 20px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.2;
      }

      .lead {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.7;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .search {
        width: 280px;
        height: 42px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .stat {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .stat strong {
        display: block;
        font-size: 28px;
        line-height: 1;
      }

      .stat span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .notice {
        padding: 14px 16px;
        margin-bottom: 18px;
        border: 1px solid #ead19b;
        border-radius: 8px;
        background: #fff9e8;
        color: #76500b;
        line-height: 1.7;
      }

      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .basic-tabs {
        margin-top: -8px;
      }

      .tab {
        height: 38px;
        padding: 0 14px;
        border: 1px solid #c8ddec;
        border-radius: 6px;
        color: #285275;
        background: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .tab.active {
        border-color: #153b61;
        color: #fff;
        background: #153b61;
      }

      .tab span {
        margin-left: 6px;
        font-size: 12px;
        opacity: 0.78;
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .empty-state {
        padding: 28px;
        border: 1px dashed #bdd3e7;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
        color: var(--muted);
        line-height: 1.7;
      }

      .empty-state h2 {
        margin-bottom: 8px;
        color: var(--text);
        font-size: 22px;
      }

      .record {
        display: grid;
        grid-template-columns: minmax(420px, 560px) minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .shots {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
        align-content: start;
      }

      .shot {
        position: relative;
        display: grid;
        gap: 6px;
        align-content: start;
      }

      .shot img {
        width: 100%;
        border: 1px solid #bcd6ec;
        border-radius: 6px;
        background: #d7ecff;
        image-rendering: auto;
      }

      .shot-id {
        position: absolute;
        right: 8px;
        top: 8px;
        display: inline-grid;
        place-items: center;
        min-width: 30px;
        height: 26px;
        padding: 0 7px;
        border-radius: 6px;
        color: #fff;
        background: rgba(21, 59, 97, 0.92);
        font-size: 12px;
        font-weight: 800;
      }

      .file {
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .info {
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .record-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .index {
        display: inline-grid;
        place-items: center;
        min-width: 34px;
        height: 30px;
        padding: 0 8px;
        border-radius: 6px;
        color: #fff;
        background: #153b61;
        font-weight: 800;
      }

      .pet h2 {
        font-size: 22px;
        line-height: 1.25;
      }

      .pet p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 28px;
        padding: 0 8px;
        border: 1px solid #c8ddec;
        border-radius: 6px;
        color: #285275;
        background: #f5fbff;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }

      .tag.warning {
        border-color: #e7b4a9;
        color: #9d3f33;
        background: #fff3ef;
      }

      .skill-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .numbers {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .number-panel {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfdff;
      }

      .number-panel h3 {
        margin: 0 0 8px;
        color: #285275;
        font-size: 13px;
      }

      .number-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 4px 0;
        border-top: 1px solid #edf3f9;
        font-size: 12px;
        line-height: 1.25;
      }

      .number-row:first-of-type {
        border-top: 0;
      }

      .number-row span:first-child {
        color: var(--muted);
      }

      .number-row span:last-child {
        font-weight: 800;
        text-align: right;
      }

      .skills {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .skill {
        min-height: 42px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-strong);
        font-size: 13px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .skill.empty {
        color: #8aa0b6;
        background: #eef5fb;
      }

      .skill.pending {
        border-color: #edc4ba;
        color: #8f352b;
        background: #fff6f3;
        font-weight: 700;
      }

      .same {
        padding: 12px;
        border: 1px dashed #c5d9ea;
        border-radius: 8px;
        color: var(--muted);
        background: #f8fcff;
        line-height: 1.6;
      }

      .sources {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .compare-view {
        display: grid;
        gap: 16px;
      }

      .compare-section {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: var(--shadow);
      }

      .compare-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 12px;
      }

      .compare-head h2 {
        font-size: 20px;
        line-height: 1.25;
      }

      .compare-head p {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }

      .compare-cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .compare-card {
        min-height: 112px;
        padding: 13px;
        border: 1px solid #d3e3f1;
        border-radius: 8px;
        background: #fbfdff;
      }

      .compare-card strong {
        display: block;
        margin-bottom: 6px;
        color: #153b61;
        font-size: 22px;
        line-height: 1.15;
      }

      .compare-card span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .compare-card p {
        margin-top: 8px;
        color: #334960;
        font-size: 13px;
        line-height: 1.55;
      }

      .insight-list {
        display: grid;
        gap: 8px;
      }

      .insight {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 10px;
        padding: 10px 0;
        border-top: 1px solid #edf3f9;
        font-size: 13px;
        line-height: 1.55;
      }

      .insight:first-child {
        border-top: 0;
      }

      .insight b {
        color: #285275;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .compare-table {
        width: 100%;
        min-width: 1120px;
        border-collapse: collapse;
        font-size: 13px;
      }

      .compare-table th,
      .compare-table td {
        padding: 10px;
        border-bottom: 1px solid #edf3f9;
        text-align: left;
        vertical-align: top;
      }

      .compare-table th {
        position: sticky;
        top: 0;
        z-index: 1;
        color: #285275;
        background: #f5fbff;
        font-size: 12px;
        white-space: nowrap;
      }

      .compare-table tr:last-child td {
        border-bottom: 0;
      }

      .pet-name {
        font-weight: 800;
        color: var(--text);
      }

      .metric-line {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .metric-line span {
        color: var(--muted);
        white-space: nowrap;
      }

      .metric-line b {
        color: var(--text);
      }

      .role-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .role-tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 2px 7px;
        border: 1px solid #c8ddec;
        border-radius: 6px;
        color: #285275;
        background: #f5fbff;
        font-size: 12px;
        font-weight: 800;
      }

      .role-tag.magic {
        border-color: #b9d3f0;
        color: #1267ba;
        background: #eff7ff;
      }

      .role-tag.physical {
        border-color: #e2c48c;
        color: #8a580a;
        background: #fff8e8;
      }

      .role-tag.speed {
        border-color: #aacfbf;
        color: #24714d;
        background: #f1fbf6;
      }

      .role-tag.beast {
        border-color: #c9b4e8;
        color: #5a3f8f;
        background: #f8f3ff;
      }

      .role-tag.pending-book {
        border-color: #e7b4a9;
        color: #9d3f33;
        background: #fff3ef;
      }

      .key-skills {
        max-width: 340px;
        color: #334960;
        line-height: 1.5;
      }

      .advice {
        color: #334960;
        line-height: 1.5;
      }

      .matrix-table {
        width: 100%;
        min-width: var(--matrix-min-width, 720px);
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 13px;
      }

      .matrix-table th,
      .matrix-table td {
        min-width: 92px;
        height: 76px;
        padding: 8px;
        border: 1px solid #1f2d3a;
        text-align: center;
        vertical-align: middle;
      }

      .matrix-table th {
        color: #142232;
        background: #f7fbff;
        font-weight: 800;
        white-space: nowrap;
      }

      .matrix-group-head {
        height: 40px;
        color: #153b61;
        background: #eaf4ff;
        font-size: 13px;
      }

      .matrix-sections {
        display: grid;
        gap: 14px;
      }

      .matrix-section-title {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        margin: 0 0 8px;
        padding: 0 10px;
        border: 1px solid #c9ddec;
        border-radius: 6px;
        color: #153b61;
        background: #f3f9ff;
        font-size: 15px;
        line-height: 1.3;
      }

      .matrix-row-head {
        position: sticky;
        left: 0;
        z-index: 1;
        width: 82px;
        color: #153b61;
        background: #fbfdff;
        font-weight: 900;
      }

      .matrix-cell {
        display: grid;
        gap: 5px;
        justify-items: center;
        line-height: 1.25;
      }

      .matrix-main {
        color: #142232;
        font-weight: 900;
      }

      .matrix-sub {
        color: #53687e;
        font-size: 12px;
      }

      .matrix-empty {
        color: #9aadbf;
      }

      mark {
        padding: 0 3px;
        border-radius: 4px;
        color: inherit;
        background: #ffef9d;
      }

      @media (max-width: 1080px) {
        .record {
          grid-template-columns: 1fr;
        }

        .shot img {
          max-width: 560px;
        }
      }

      @media (max-width: 760px) {
        .page {
          width: min(100% - 24px, 1440px);
          padding-top: 18px;
        }

        .topbar,
        .stats {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: stretch;
        }

        .search {
          width: 100%;
        }

        .skills {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .numbers {
          grid-template-columns: 1fr;
        }

        .compare-cards {
          grid-template-columns: 1fr;
        }

        .compare-head,
        .insight {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>宠物图片识别总览</h1>
          <p class="lead">按文件夹切换查看，也可横向对比各目录成品。汇总只基于现有识别记录，不重新识别图片。</p>
        </div>
        <div class="toolbar">
          <input id="searchInput" class="search" type="search" placeholder="搜索宠物、技能、定位" />
        </div>
      </header>

      <nav id="tabs" class="tabs" aria-label="页面视图"></nav>
      <nav id="basicTabs" class="tabs basic-tabs" aria-label="基础资料目录"></nav>

      <section class="stats" aria-label="统计">
        <div class="stat"><strong id="groupCount">11</strong><span id="groupLabel">宠物记录组</span></div>
        <div class="stat"><strong id="shotCount">22</strong><span id="shotLabel">截图来源</span></div>
        <div class="stat"><strong id="pendingCount">0</strong><span id="pendingLabel">含待确认记录组</span></div>
        <div class="stat"><strong id="folderName">FC</strong><span id="folderLabel">当前目录</span></div>
      </section>

      <p id="notice" class="notice" hidden></p>

      <section id="records" class="grid" aria-live="polite"></section>
    </main>

          note: "MYT 已按 20 张截图逐张识别，合并为 10 组。技能数按全局统一规则，不含空、符、驭、觉醒、强化、之心。",
        },
      ];

      const compareKey = "COMPARE";
      const matrixKey = "MATRIX";
      const basicKey = "BASIC";
      let activeKey = compareKey;
      let activeFolderKey = "FC";

      const inheritedSkills = (record, allRecords) => {
        if (record.skills) return record.skills;
        const sourceId = record.same.match(/同\s+(\d+)/)?.[1];
        return allRecords.find((item) => item.id === sourceId)?.skills || [];
      };

      const isPending = (text) => text.includes("待确认") || text.includes("疑似");
      const imagePath = (file, folder = activeFolderKey) => `./图片/${folder}/${file}`;
      const isCountedSkill = (skill) =>
        skill !== "空" &&
        !skill.includes("(符)") &&
        !skill.includes("(驭)") &&
        !skill.includes("强化") &&
        !skill.includes("之心") &&
        !skill.startsWith("觉醒");

      const getRowValue = (rows = [], label) => rows.find(([name]) => name.includes(label))?.[1] || "";
      const parseFirstNumber = (value) => Number(String(value || "").match(/\d+/)?.[0] || 0);
      const cleanPetName = (pet) => pet.replace(/\(\d+\)/g, "");
      const unique = (items) => [...new Set(items.filter(Boolean))];

      function panelNumber(group, label) {
        return parseFirstNumber(getRowValue(group.stats?.panel, label));
      }

      function aptitudeValue(group, label) {
        return getRowValue(group.stats?.aptitude, label);
      }

      function currentAptitudeValue(value) {
        return String(value || "").split("/")[0] || "";
      }

      function currentAptitudeNumber(value) {
        return Number(currentAptitudeValue(value) || 0);
      }

      const beastBaseAptitudes = {
        神兽青蛇: { attack: 1500, defense: 1450, stamina: 1450, magic: 1500, speed: 1400 },
        神兽龙马: { attack: 1500, defense: 1500, stamina: 1450, magic: 1450, speed: 1400 },
      };

      function beastStage(row) {
        const base = beastBaseAptitudes[row.cleanName];
        if (!base) return "";
        const deltas = [
          currentAptitudeNumber(row.attackApt) - base.attack,
          currentAptitudeNumber(row.defenseApt) - base.defense,
          currentAptitudeNumber(row.staminaApt) - base.stamina,
          currentAptitudeNumber(row.magicApt) - base.magic,
          currentAptitudeNumber(row.speedApt) - base.speed,
        ];
        const minDelta = Math.min(...deltas);
        if (minDelta >= 70) return "进阶2";
        if (minDelta >= 50) return "进阶1";
        return "有饰品";
      }

      function talentNumber(meta = "") {
        return parseFirstNumber(meta.match(/[优极]\((\d+)\)/)?.[1]);
      }

      function bloodlineText(meta = "") {
        return meta.match(/血脉：([^｜]+)/)?.[1] || "";
      }

      function keySkillText(skills) {
        const keywords = [
          "剑气",
          "高级必杀",
          "高级连击",
          "高级吸血",
          "高级偷袭",
          "高级强力",
          "高级夜战",
          "高级攻坚",
          "高级隐身",
          "法术",
          "法爆",
          "法连",
          "灵蕴",
          "涡轮火",
          "分水神剑",
          "雷利风行",
          "山崩地倾",
          "红莲业火",
          "葫芦仙法",
          "水刃斩",
          "生死相依",
          "幽冥之佑",
          "高级敏捷",
          "高级强壮",
          "高级防御",
        ];
        const picked = skills.filter((skill) => skill !== "空" && keywords.some((keyword) => skill.includes(keyword)));
        return unique(picked).slice(0, 7).join("、") || unique(skills.filter((skill) => skill !== "空")).slice(0, 5).join("、");
      }

      function isBookPending(row) {
        return row.skills.filter((skill) => skill === "空").length >= 4;
      }

      function classifyComparisonRow(row) {
        const text = row.skills.join("、");
        const isBeast = row.pet.includes("神兽") || aptitudeValue(row, "寿命") === "永生";
        const petName = cleanPetName(row.pet);
        if (isBookPending(row)) {
          return {
            primary: "待打书",
            tone: "pending",
            tags: unique(["待打书", isBeast ? "神兽" : ""]),
            advice: "技能格空位较多，按待打书半成品看，先不按最终定位评价强弱。",
          };
        }
        const forcedRole = petName === "桃花精灵" ? "千速" : ["赤炎童子", "冥卫"].includes(petName) ? "卡速" : "";
        if (forcedRole) {
          return {
            primary: forcedRole,
            tone: "speed",
            tags: unique([forcedRole, isBeast ? "神兽" : ""]),
            advice: forcedRole === "千速" ? "按千速功能宠比较，重点看速度面板、生存和速度资质。" : "按卡速功能宠比较，重点看速度、生存、抗性和敏捷投入。",
          };
        }
        const hasSword = text.includes("剑气四射");
        const hasSpecialMagic = ["涡轮火", "分水神剑", "雷利风行", "山崩地倾"].some((skill) => text.includes(skill));
        const hasNormalMagic = ["红莲业火", "葫芦仙法"].some((skill) => text.includes(skill));
        const hasMagicSkill = hasSpecialMagic || hasNormalMagic || text.includes("法术") || text.includes("法连") || text.includes("法爆") || text.includes("灵蕴");
        const hasAdvancedStealth = text.includes("高级隐身");

        if (petName === "沧海公主") {
          return {
            primary: "特殊单攻",
            tone: "physical",
            tags: unique(["特殊单攻", isBeast ? "神兽" : ""]),
            advice: "按特殊单攻宝宝比较，重点看攻击面板、核心输出技能和生存补强。",
          };
        }

        if (petName === "神兽青蛇" && hasMagicSkill) {
          return {
            primary: "普通法",
            tone: "magic",
            tags: unique(["普通法", "神兽"]),
            advice: "神兽青蛇带法系技能，按普通法宝宝比较法连/法暴/灵蕴、灵力和法资。",
          };
        }

        if (hasAdvancedStealth && row.speed < 1400) {
          return {
            primary: "隐攻",
            tone: "physical",
            tags: unique(["隐攻", isBeast ? "神兽" : "", hasSword ? "剑气" : ""]),
            advice: "带高级隐身且不是千速，按隐攻宝宝比较攻击面板、必杀/连击/偷袭和生存。",
          };
        }

        const magicScore =
          (row.spirit >= 1200 ? 2 : 0) +
          (text.includes("法术") || text.includes("法连") || text.includes("法爆") ? 2 : 0) +
          (text.includes("灵蕴") ? 1 : 0) +
          (hasSpecialMagic || hasNormalMagic ? 2 : 0);
        const physicalScore =
          (row.attack >= 1800 ? 2 : 0) +
          (text.includes("高级必杀") ? 1 : 0) +
          (text.includes("高级连击") ? 1 : 0) +
          (text.includes("高级吸血") ? 1 : 0) +
          (text.includes("高级偷袭") ? 1 : 0) +
          (text.includes("高级强力") || text.includes("高级攻坚") ? 1 : 0) +
          (hasSword ? 2 : 0);

        const tags = [];
        let primary = "待归类";
        let tone = "";
        let advice = "记录字段完整度够用，建议结合队伍缺口再定用途。";

        if (row.speed >= 1400) {
          primary = "千速";
          tone = "speed";
          advice = "速度面板达到高速段，优先按千速/高速功能宠比较生存和速度资质。";
        } else if (row.speed >= 850 && row.attack < 1300 && row.spirit < 800) {
          primary = row.speed >= 1000 ? "千速" : "卡速";
          tone = "speed";
          advice = "速度明显高于常规输出宠，适合按卡速功能宠看抗性、血量和敏捷投入。";
        } else if (magicScore >= physicalScore && magicScore >= 3) {
          primary = hasSpecialMagic ? "特殊法" : "普通群法";
          tone = "magic";
          advice = "法系方向，重点看法连/法暴/灵蕴、灵力面板、法资与成品技能完整度。";
        } else if (physicalScore >= 3) {
          primary = hasSword ? "剑气" : "全力单攻";
          tone = "physical";
          advice = hasSword ? "物理剑气方向，重点比较攻击面板、必杀/强力/攻坚和剑气来源。" : "物理单攻方向，重点比较攻击面板、必杀/连击/吸血/偷袭完整度。";
        } else if (hasNormalMagic || text.includes("高级敏捷")) {
          primary = row.speed >= 850 ? "卡速" : "普通群法";
          tone = row.speed >= 850 ? "speed" : "magic";
          advice = row.speed >= 850 ? "可按卡速功能位观察，速度未到千速但有敏捷或功能技能。" : "有群法/法系技能信号，但面板更像低投入或未成型。";
        }

        tags.push(primary);
        if (isBeast) tags.push("神兽");
        if (primary !== "千速" && row.speed >= 1000) tags.push("千速");
        if (primary !== "卡速" && row.speed >= 850 && row.speed < 1000) tags.push("卡速");
        if (primary !== "剑气" && hasSword) tags.push("剑气");

        return { primary, tone, tags: unique(tags), advice };
      }

      function buildComparisonRows() {
        return datasets.flatMap((dataset) =>
          buildGroups(dataset.records).map((group) => {
            const row = {
              ...group,
              datasetKey: dataset.key,
              datasetLabel: dataset.label,
              source: dataset.source,
              cleanName: cleanPetName(group.pet),
              skillCount: group.skills.filter(isCountedSkill).length,
              keySkills: keySkillText(group.skills),
              hp: panelNumber(group, "气血"),
              attack: panelNumber(group, "攻击"),
              defense: panelNumber(group, "防御"),
              speed: panelNumber(group, "速度"),
              spirit: panelNumber(group, "灵力"),
              talent: talentNumber(group.meta),
              bloodline: bloodlineText(group.meta),
              life: aptitudeValue(group, "寿命"),
              speedApt: aptitudeValue(group, "速度资质"),
              attackApt: aptitudeValue(group, "攻击资质"),
              defenseApt: aptitudeValue(group, "防御资质"),
              staminaApt: aptitudeValue(group, "体力资质"),
              magicApt: aptitudeValue(group, "法力资质"),
            };
            row.beastStage = beastStage(row);
            row.analysis = classifyComparisonRow(row);
            row.searchText = [
              row.datasetLabel,
              row.pet,
              row.cleanName,
              row.meta,
              row.heart || "",
              row.skillCount,
              row.keySkills,
              row.analysis.primary,
              row.analysis.tags.join(" "),
              row.beastStage,
              row.analysis.advice,
              ...row.shots.flatMap((shot) => [shot.id, shot.file, shot.note]),
              ...statsSearchText(row.stats),
              ...row.skills,
            ]
              .join(" ")
              .toLowerCase();
            return row;
          })
        );
      }

      function topRows(rows, metric, limit = 3) {
        return [...rows].sort((a, b) => b[metric] - a[metric] || b.talent - a.talent).slice(0, limit);
      }

      function roleCount(rows, names) {
        return rows.filter((row) => names.includes(row.analysis.primary) || row.analysis.tags.some((tag) => names.includes(tag))).length;
      }

      function renderRoleTags(row, query) {
        return `<div class="role-tags">${row.analysis.tags
          .map((tag) => {
            const cls = tag.includes("待打书") ? "pending-book" : tag.includes("法") ? "magic" : tag.includes("剑气") || tag.includes("单攻") || tag.includes("隐攻") ? "physical" : tag.includes("速") ? "speed" : tag.includes("神兽") ? "beast" : "";
            return `<span class="role-tag ${cls}">${highlight(tag, query)}</span>`;
          })
          .join("")}</div>`;
      }

      function renderMetricLine(row) {
        return `<div class="metric-line">
          <span>攻 <b>${row.attack || "-"}</b></span>
          <span>速 <b>${row.speed || "-"}</b></span>
          <span>灵 <b>${row.spirit || "-"}</b></span>
          <span>血 <b>${row.hp || "-"}</b></span>
        </div>`;
      }

      function renderRoleCards(rows, query) {
        const cardData = [
          {
            title: "法宝宝",
            count: roleCount(rows, ["特殊法", "普通群法", "普通法"]),
            detail: topRows(rows.filter((row) => ["特殊法", "普通群法", "普通法"].includes(row.analysis.primary)), "spirit")
              .map((row) => `${row.datasetLabel} ${row.pet}(${row.spirit})`)
              .join("；") || "暂无",
          },
          {
            title: "物理宝宝",
            count: roleCount(rows, ["剑气", "全力单攻", "特殊单攻", "隐攻"]),
            detail: topRows(rows.filter((row) => ["剑气", "全力单攻", "特殊单攻", "隐攻"].includes(row.analysis.primary)), "attack")
              .map((row) => `${row.datasetLabel} ${row.pet}(${row.attack})`)
              .join("；") || "暂无",
          },
          {
            title: "卡速 / 千速",
            count: roleCount(rows, ["卡速", "千速"]),
            detail: topRows(rows.filter((row) => row.analysis.tags.includes("卡速") || row.analysis.tags.includes("千速")), "speed")
              .map((row) => `${row.datasetLabel} ${row.pet}(${row.speed})`)
              .join("；") || "暂无",
          },
          {
            title: "神兽",
            count: roleCount(rows, ["神兽"]),
            detail: topRows(rows.filter((row) => row.analysis.tags.includes("神兽")), "talent")
              .map((row) => `${row.datasetLabel} ${row.pet}(${row.talent || "无天资"})`)
              .join("；") || "暂无",
          },
        ];

        return `<div class="compare-cards">${cardData
          .map(
            (card) => `<article class="compare-card">
              <strong>${card.count}</strong>
              <span>${card.title}</span>
              <p>${highlight(card.detail, query)}</p>
            </article>`
          )
          .join("")}</div>`;
      }

      function renderInsights(rows, query) {
        const magicTop = topRows(rows.filter((row) => ["特殊法", "普通群法", "普通法"].includes(row.analysis.primary)), "spirit", 4);
        const physicalTop = topRows(rows.filter((row) => ["剑气", "全力单攻", "特殊单攻", "隐攻"].includes(row.analysis.primary)), "attack", 4);
        const speedTop = topRows(rows.filter((row) => row.analysis.tags.includes("卡速") || row.analysis.tags.includes("千速")), "speed", 4);
        const beastTop = topRows(rows.filter((row) => row.analysis.tags.includes("神兽")), "talent", 4);
        const lines = [
          ["法系候选", magicTop.map((row) => `${row.datasetLabel} ${row.pet}：灵力 ${row.spirit}，${row.analysis.primary}`).join("；")],
          ["物理候选", physicalTop.map((row) => `${row.datasetLabel} ${row.pet}：攻击 ${row.attack}，${row.analysis.primary}`).join("；")],
          ["速度候选", speedTop.map((row) => `${row.datasetLabel} ${row.pet}：速度 ${row.speed}，${row.analysis.primary}`).join("；")],
          ["神兽候选", beastTop.map((row) => `${row.datasetLabel} ${row.pet}：天资 ${row.talent || "-"}，${row.bloodline || "无血脉"}`).join("；")],
        ];

        return `<div class="insight-list">${lines
          .map(([title, body]) => `<div class="insight"><b>${title}</b><span>${highlight(body || "暂无", query)}</span></div>`)
          .join("")}</div>`;
      }

      function renderComparisonTable(rows, query) {
        return `<div class="table-wrap">
          <table class="compare-table">
            <thead>
              <tr>
                <th>目录</th>
                <th>宠物</th>
                <th>定位</th>
                <th>技能</th>
                <th>面板</th>
                <th>天资 / 心 / 血脉</th>
                <th>资质</th>
                <th>建议</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `<tr>
                    <td><span class="tag">${row.datasetLabel}</span></td>
                    <td>
                      <div class="pet-name">${highlight(row.pet, query)}</div>
                    </td>
                    <td>${renderRoleTags(row, query)}</td>
                    <td>
                      <div class="tag">技能数 ${row.skillCount}</div>
                      <div class="key-skills">${highlight(row.keySkills, query)}</div>
                    </td>
                    <td>${renderMetricLine(row)}</td>
                    <td>${highlight(`天资 ${row.talent || "-"}｜${row.heart || "未记心色"}｜${row.bloodline || "-"}`, query)}</td>
                    <td>${highlight(`攻资 ${currentAptitudeValue(row.attackApt) || "-"}｜法资 ${currentAptitudeValue(row.magicApt) || "-"}｜速资 ${currentAptitudeValue(row.speedApt) || "-"}｜寿命 ${row.life || "-"}`, query)}</td>
                    <td class="advice">${highlight(row.analysis.advice, query)}</td>
                  </tr>`
                )
                .join("")}
            </tbody>
          </table>
        </div>`;
      }

      function renderSpeciesTable(rows, query) {
        const byName = new Map();
        rows.forEach((row) => {
          if (!byName.has(row.cleanName)) byName.set(row.cleanName, []);
          byName.get(row.cleanName).push(row);
        });
        const species = [...byName.entries()]
          .map(([name, items]) => ({
            name,
            items,
            folders: unique(items.map((item) => item.datasetLabel)).join("、"),
            roles: unique(items.flatMap((item) => item.analysis.tags)).join("、"),
            bestTalent: topRows(items, "talent", 1)[0],
            bestAttack: topRows(items, "attack", 1)[0],
            bestSpeed: topRows(items, "speed", 1)[0],
            bestSpirit: topRows(items, "spirit", 1)[0],
          }))
          .sort((a, b) => b.items.length - a.items.length || b.bestTalent.talent - a.bestTalent.talent)
          .slice(0, 12);

        return `<div class="table-wrap">
          <table class="compare-table">
            <thead>
              <tr>
                <th>同名宠物</th>
                <th>出现目录</th>
                <th>定位覆盖</th>
                <th>最高天资</th>
                <th>最高攻击</th>
                <th>最高速度</th>
                <th>最高灵力</th>
              </tr>
            </thead>
            <tbody>
              ${species
                .map(
                  (item) => `<tr>
                    <td><span class="pet-name">${highlight(item.name, query)}</span><div class="sources">${item.items.length} 组记录</div></td>
                    <td>${highlight(item.folders, query)}</td>
                    <td>${highlight(item.roles, query)}</td>
                    <td>${highlight(`${item.bestTalent.datasetLabel} ${item.bestTalent.talent || "-"}`, query)}</td>
                    <td>${highlight(`${item.bestAttack.datasetLabel} ${item.bestAttack.attack || "-"}`, query)}</td>
                    <td>${highlight(`${item.bestSpeed.datasetLabel} ${item.bestSpeed.speed || "-"}`, query)}</td>
                    <td>${highlight(`${item.bestSpirit.datasetLabel} ${item.bestSpirit.spirit || "-"}`, query)}</td>
                  </tr>`
                )
                .join("")}
            </tbody>
          </table>
        </div>`;
      }

      function renderCompareEmpty(query) {
        return `<section class="empty-state">
          <h2>没有匹配的横向对比结果</h2>
          <p>当前搜索：<code>${highlight(query, query)}</code>。可搜索目录、宠物名、技能名或定位标签。</p>
        </section>`;
      }

      function renderCompare() {
        const allRows = buildComparisonRows();
        const query = document.getElementById("searchInput").value.trim();
        const queryLower = query.toLowerCase();
        const visible = queryLower ? allRows.filter((row) => row.searchText.includes(queryLower)) : allRows;
        const pending = visible.filter((row) => row.skills.some(isPending)).length;

        document.getElementById("records").innerHTML = visible.length
          ? `<div class="compare-view">
              <section class="compare-section">
                <div class="compare-head">
                  <div>
                    <h2>定位汇总</h2>
                    <p>分类为辅助判断：先看速度面板，再看法系/物理核心技能与面板，神兽作为附加标签保留。</p>
                  </div>
                </div>
                ${renderRoleCards(visible, query)}
              </section>
              <section class="compare-section">
                <div class="compare-head">
                  <div>
                    <h2>优先候选</h2>
                    <p>每类按对应关键面板排序，方便先锁定值得继续看的宝宝。</p>
                  </div>
                </div>
                ${renderInsights(visible, query)}
              </section>
              <section class="compare-section">
                <div class="compare-head">
                  <div>
                    <h2>全记录横向表</h2>
                    <p>保留目录、关键技能、面板与资质，便于跨账号或跨文件夹逐行比较。</p>
                  </div>
                </div>
                ${renderComparisonTable(visible, query)}
              </section>
              <section class="compare-section">
                <div class="compare-head">
                  <div>
                    <h2>同名宠物对比</h2>
                    <p>按宠物名聚合，看同一种宝宝在哪个目录的天资、攻击、速度或灵力更突出。</p>
                  </div>
                </div>
                ${renderSpeciesTable(visible, query)}
              </section>
            </div>`
          : renderCompareEmpty(query);

        document.getElementById("groupCount").textContent = visible.length;
        document.getElementById("shotCount").textContent = visible.reduce((sum, row) => sum + row.shots.length, 0);
        document.getElementById("pendingCount").textContent = pending;
        document.getElementById("folderName").textContent = unique(visible.map((row) => row.datasetLabel)).length || 0;
        document.getElementById("groupLabel").textContent = "横向记录组";
        document.getElementById("shotLabel").textContent = "截图来源";
        document.getElementById("pendingLabel").textContent = "含待确认记录组";
        document.getElementById("folderLabel").textContent = "覆盖目录数";
        document.getElementById("notice").hidden = true;
        renderTabs();
      }

      const matrixColumns = [
        { key: "huodou", label: "祸斗", group: "日常", match: (row) => row.cleanName === "祸斗" },
        { key: "leisi", label: "雷司", group: "日常", match: (row) => row.cleanName === "雷司" },
        { key: "jiutou", label: "九头", group: "日常", match: (row) => row.cleanName === "九头鸟" },
        { key: "swordSnake", label: "剑气蛇", match: (row) => row.cleanName === "神兽青蛇" && (row.analysis.primary === "剑气" || row.analysis.tags.includes("剑气")) },
        { key: "stealthSnake", label: "追影蛇", match: (row) => row.cleanName === "神兽青蛇" && row.analysis.primary === "隐攻" },
        { key: "magicSnake", label: "法蛇", match: (row) => row.cleanName === "神兽青蛇" && row.analysis.primary === "普通法" },
        { key: "hanling", label: "寒凌", match: (row) => row.cleanName === "寒翎" },
        { key: "horse", label: "小马", match: (row) => row.cleanName === "神兽龙马" },
        { key: "mingwei", label: "冥卫", match: (row) => row.cleanName === "冥卫" },
        { key: "princess", label: "公主", match: (row) => row.cleanName === "沧海公主" },
        { key: "lobster", label: "龙虾", match: (row) => row.cleanName === "龙虾骑士" },
        { key: "yunluo", label: "云罗", match: (row) => row.cleanName === "云萝仙子" },
        { key: "tongzi", label: "童子", match: (row) => row.cleanName === "赤炎童子" },
        { key: "taohua", label: "桃花", match: (row) => row.cleanName === "桃花精灵" },
        { key: "child", label: "孩子", match: (row) => row.cleanName === "孩子" || /^5$/.test(row.cleanName) },
      ];

      const matrixSections = [
        { title: "日常", columns: matrixColumns.filter((column) => column.group === "日常") },
        { title: "PK：神兽蛇 / 小马", columns: matrixColumns.filter((column) => ["swordSnake", "stealthSnake", "magicSnake", "horse"].includes(column.key)) },
        { title: "PK：法系 / 特殊", columns: matrixColumns.filter((column) => ["hanling", "princess"].includes(column.key)) },
        { title: "PK：物理 / 速度", columns: matrixColumns.filter((column) => ["mingwei", "lobster", "yunluo", "tongzi", "taohua", "child"].includes(column.key)) },
      ];

      const matrixOrder = ["FC", "LG1", "PT", "LG2", "MYT"];

      function matrixScore(row, columnKey) {
        if (["huodou", "magicSnake", "jiutou", "jingluan"].includes(columnKey) || row.analysis.primary.includes("法")) return row.spirit || 0;
        if (["mingwei", "taohua", "tongzi"].includes(columnKey) || row.analysis.primary.includes("速")) return row.speed || 0;
        if (columnKey === "horse") return row.talent || 0;
        return row.attack || row.talent || 0;
      }

      function renderMatrixCell(rows, column) {
        if (!rows.length) return `<span class="matrix-empty">-</span>`;
        const best = [...rows].sort((a, b) => matrixScore(b, column.key) - matrixScore(a, column.key) || b.talent - a.talent)[0];
        if (best.analysis.primary === "待打书") {
          return `<div class="matrix-cell">
            <div class="matrix-main">待打书</div>
          </div>`;
        }
        const mainMetric = best.analysis.primary.includes("法") ? `灵 ${best.spirit || "-"}` : best.analysis.primary.includes("速") ? `速 ${best.speed || "-"}` : `攻 ${best.attack || "-"}`;
        return `<div class="matrix-cell">
          <div class="matrix-main">${best.analysis.primary}</div>
          <div class="matrix-sub">${best.heart || "未记心色"}</div>
          ${best.beastStage ? `<div class="matrix-sub">${best.beastStage}</div>` : ""}
          <div class="matrix-sub">血 ${best.hp || "-"} / 防 ${best.defense || "-"}</div>
          <div class="matrix-sub">${mainMetric}</div>
        </div>`;
      }

      function renderMatrixSection(rows, section) {
        const minWidth = Math.max(360, 104 + section.columns.length * 118);
        return `<div class="table-wrap">
          <table class="matrix-table" style="--matrix-min-width: ${minWidth}px">
            <thead>
              <tr>
                <th></th>
                ${section.columns.map((column) => `<th>${column.label}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${matrixOrder
                .map((folderKey) => {
                  const folderRows = rows.filter((row) => row.datasetKey === folderKey);
                  return `<tr>
                    <th class="matrix-row-head">${folderKey}</th>
                    ${section.columns
                      .map((column) => `<td>${renderMatrixCell(folderRows.filter(column.match), column)}</td>`)
                      .join("")}
                  </tr>`;
                })
                .join("")}
            </tbody>
          </table>
        </div>`;
      }

      function renderMatrixTable(rows) {
        return `<div class="matrix-sections">
          ${matrixSections
            .map((section) => `<section class="matrix-section">
              <h3 class="matrix-section-title">${section.title}</h3>
              ${renderMatrixSection(rows, section)}
            </section>`)
            .join("")}
        </div>`;
      }

      function renderMatrix() {
        const allRows = buildComparisonRows();
        const query = document.getElementById("searchInput").value.trim();
        const queryLower = query.toLowerCase();
        const visible = queryLower ? allRows.filter((row) => row.searchText.includes(queryLower)) : allRows;
        const pending = visible.filter((row) => row.skills.some(isPending)).length;

        document.getElementById("records").innerHTML = visible.length
          ? `<div class="compare-view">
              <section class="compare-section">
                <div class="compare-head">
                  <div>
                    <h2>矩阵对比</h2>
                    <p>按目录和固定宝宝类型铺开，格子内显示该目录最优候选的定位、心、神兽阶段、气血、防御和关键面板。</p>
                  </div>
                </div>
                ${renderMatrixTable(visible)}
              </section>
            </div>`
          : renderCompareEmpty(query);

        document.getElementById("groupCount").textContent = visible.length;
        document.getElementById("shotCount").textContent = visible.reduce((sum, row) => sum + row.shots.length, 0);
        document.getElementById("pendingCount").textContent = pending;
        document.getElementById("folderName").textContent = matrixColumns.length;
        document.getElementById("groupLabel").textContent = "矩阵记录组";
        document.getElementById("shotLabel").textContent = "截图来源";
        document.getElementById("pendingLabel").textContent = "含待确认记录组";
        document.getElementById("folderLabel").textContent = "矩阵列数";
        document.getElementById("notice").hidden = true;
        renderTabs();
      }

      function buildGroups(allRecords) {
        const groups = [];
        const byId = new Map();
        allRecords.forEach((record) => {
          if (record.skipped) return;
          const sourceId = record.same?.match(/同\s+(\d+)/)?.[1];
          if (sourceId && byId.has(sourceId)) {
            byId.get(sourceId).shots.push({
              id: record.id,
              file: record.file,
              folder: record.sourceFolder,
              note: record.same,
            });
            return;
          }

          const group = {
            id: record.id,
            pet: record.pet,
            meta: record.meta,
            heart: record.heart,
            stats: record.stats,
            skills: inheritedSkills(record, allRecords),
            shots: [
              {
                id: record.id,
                file: record.file,
                folder: record.sourceFolder,
                note: "主截图",
              },
            ],
          };
          groups.push(group);
          byId.set(record.id, group);
        });
        return groups;
      }

      function highlight(text, query) {
        if (!query) return text;
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(new RegExp(safe, "gi"), (match) => `<mark>${match}</mark>`);
      }

      function statsSearchText(stats) {
        if (!stats) return [];
        return [...stats.panel, ...stats.points, ...stats.aptitude, ...(stats.growth || [])].flat();
      }

      function renderNumberPanel(title, rows, query) {
        return `<section class="number-panel">
          <h3>${title}</h3>
          ${rows.map(([label, value]) => `<div class="number-row"><span>${highlight(label, query)}</span><span>${highlight(value, query)}</span></div>`).join("")}
        </section>`;
      }

      function renderStats(stats, query) {
        if (!stats) return "";
        return `<div class="numbers">
          ${renderNumberPanel("面板", stats.panel, query)}
          ${renderNumberPanel("属性点", stats.points, query)}
          ${renderNumberPanel("资质 / 寿命", stats.aptitude, query)}
          ${stats.growth ? renderNumberPanel("养成情况", stats.growth, query) : ""}
        </div>`;
      }

      function renderGroup(group, query = "") {
        const pending = group.skills.some(isPending);
        const skillCount = group.skills.filter(isCountedSkill).length;
        const shotsHtml = group.shots
          .map(
            (shot) => `<div class="shot">
              <span class="shot-id">${shot.id}</span>
              <img src="${imagePath(shot.file, shot.folder)}" alt="${group.pet} ${shot.file}" loading="lazy" />
              <div class="file">${highlight(shot.file, query)}</div>
            </div>`
          )
          .join("");
        const skillHtml = `<div class="skills">${group.skills
          .map((skill) => {
            const classes = ["skill"];
            if (skill === "空") classes.push("empty");
            if (isPending(skill)) classes.push("pending");
            return `<div class="${classes.join(" ")}">${highlight(skill, query)}</div>`;
          })
          .join("")}</div>`;

        return `<article class="record" data-search="${[
          group.id,
          group.pet,
          group.meta,
          group.heart || "",
          `技能数 ${skillCount}`,
          ...group.shots.flatMap((shot) => [shot.id, shot.file, shot.note]),
          ...statsSearchText(group.stats),
          ...group.skills,
        ].join(" ")}">
          <div class="shots">
            ${shotsHtml}
          </div>
          <div class="info">
            <div class="record-head">
              <div class="pet">
                <h2>${highlight(group.pet, query)}</h2>
                <p>${highlight(group.meta, query)}${group.heart ? `｜心：${highlight(group.heart, query)}` : ""}</p>
              </div>
              <span class="index">${group.id}</span>
            </div>
            <div class="skill-meta">
              <div class="tag ${pending ? "warning" : ""}">${pending ? "含待确认" : "已识别"}</div>
              <div class="tag">技能数 ${skillCount}</div>
            </div>
            <p class="sources">截图来源：${group.shots.map((shot) => highlight(`${shot.id} ${shot.file}`, query)).join("；")}</p>
            ${renderStats(group.stats, query)}
            ${skillHtml}
          </div>
        </article>`;
      }

      function renderTabs() {
        const compareActive = activeKey === compareKey ? " active" : "";
        const matrixActive = activeKey === matrixKey ? " active" : "";
        const basicActive = activeKey === basicKey ? " active" : "";
        const compareCount = buildComparisonRows().length;
        const basicCount = datasets.reduce((sum, dataset) => sum + buildGroups(dataset.records).length, 0);
        const basicTabs = document.getElementById("basicTabs");
        document.getElementById("tabs").innerHTML = [
          `<button class="tab${compareActive}" type="button" data-folder="${compareKey}">横向对比<span>${compareCount}</span></button>`,
          `<button class="tab${matrixActive}" type="button" data-folder="${matrixKey}">矩阵对比<span>${matrixColumns.length}</span></button>`,
          `<button class="tab${basicActive}" type="button" data-folder="${basicKey}">基础资料<span>${basicCount}</span></button>`,
        ]
          .join("");
        basicTabs.hidden = activeKey !== basicKey;
        basicTabs.innerHTML =
          activeKey === basicKey
            ? datasets
                .map((dataset) => {
                  const active = dataset.key === activeFolderKey ? " active" : "";
                  return `<button class="tab${active}" type="button" data-basic-folder="${dataset.key}">${dataset.label}<span>${dataset.imageCount}</span></button>`;
                })
                .join("")
            : "";
      }

      function renderEmpty(dataset) {
        return `<section class="empty-state">
          <h2>${dataset.label} 待识别</h2>
          <p>来源目录：<code>${dataset.source}</code></p>
          <p>当前发现 ${dataset.imageCount} 张图片。后续开始识别时，会按统一结构记录：同宝宝合并、技能数、心色、养成情况、面板数值、资质寿命和技能列表；技能数规则所有文件夹一致。</p>
        </section>`;
      }

      function render() {
        if (activeKey === compareKey) {
          renderCompare();
          return;
        }
        if (activeKey === matrixKey) {
          renderMatrix();
          return;
        }
        const dataset = datasets.find((item) => item.key === activeFolderKey) || datasets[0];
        const groups = buildGroups(dataset.records);
        const query = document.getElementById("searchInput").value.trim();
        const queryLower = query.toLowerCase();
        const visible = groups.filter((group) => {
          if (!queryLower) return true;
          const text = [
            group.id,
            group.pet,
            group.meta,
            group.heart || "",
            `技能数 ${group.skills.filter(isCountedSkill).length}`,
            ...group.shots.flatMap((shot) => [shot.id, shot.file, shot.note]),
            ...statsSearchText(group.stats),
            ...group.skills,
          ]
            .join(" ")
            .toLowerCase();
          return text.includes(queryLower);
        });
        document.getElementById("records").innerHTML = groups.length ? visible.map((group) => renderGroup(group, query)).join("") : renderEmpty(dataset);
        document.getElementById("groupCount").textContent = visible.length;
        document.getElementById("shotCount").textContent = groups.length ? visible.reduce((sum, group) => sum + group.shots.length, 0) : dataset.imageCount;
        document.getElementById("pendingCount").textContent = groups.filter((group) => group.skills.some(isPending)).length;
        document.getElementById("folderName").textContent = dataset.label;
        document.getElementById("groupLabel").textContent = "宠物记录组";
        document.getElementById("shotLabel").textContent = "截图来源";
        document.getElementById("pendingLabel").textContent = "含待确认记录组";
        document.getElementById("folderLabel").textContent = "当前目录";
        document.getElementById("notice").hidden = true;
        renderTabs();
      }

      document.getElementById("searchInput").addEventListener("input", render);
      document.getElementById("tabs").addEventListener("click", (event) => {
        const tab = event.target.closest("[data-folder]");
        if (!tab) return;
        activeKey = tab.dataset.folder;
        document.getElementById("searchInput").value = "";
        render();
      });
      document.getElementById("basicTabs").addEventListener("click", (event) => {
        const tab = event.target.closest("[data-basic-folder]");
        if (!tab) return;
        activeFolderKey = tab.dataset.basicFolder;
        document.getElementById("searchInput").value = "";
        render();
      });
      render();
    </script>
  </body>
</html>
