<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物图片识别总览</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./pet-recognition.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="app-rail" aria-label="主导航">
        <div class="brand-lockup">
          <div class="brand-mark">兽</div>
          <div>
            <h1>神兽任务查询台</h1>
            <p>排期 / 资源 / 成本</p>
          </div>
        </div>
        <nav id="tabs" class="tabs rail-tabs" role="tablist" aria-label="页面视图"></nav>
        <div class="rail-card">
          <b>本机状态</b>
          任务勾选、资源和改价保存在当前浏览器。
        </div>
        <div class="rail-links" aria-label="相关入口">
          <a href="./index.html">技能库<span>打开</span></a>
          <a href="https://github.com/Tlyyy/sw" target="_blank" rel="noreferrer">GitHub<span>打开</span></a>
        </div>
      </aside>

      <section class="page">
        <header class="topbar">
          <div>
            <h1>神兽查询工作台</h1>
            <p class="lead">按账号查看资源、排期和成本矩阵。</p>
          </div>
          <div class="toolbar">
            <label class="sr-only" for="searchInput">搜索当前视图中的宠物、技能、定位</label>
            <input id="searchInput" class="search" type="search" placeholder="搜索当前视图中的宠物、技能、定位" autocomplete="off" />
          </div>
        </header>

        <section class="workspace">
          <div class="workspace-nav">
            <nav id="basicTabs" class="tabs basic-tabs" role="tablist" aria-label="基础资料目录"></nav>
          </div>

          <div class="workspace-body">
            <section class="view-head" aria-label="当前页面">
              <div>
                <h2 id="viewTitle">横向对比</h2>
                <p id="viewDescription">跨目录汇总定位、技能、面板和资质，适合先筛出值得继续看的宝宝。</p>
              </div>
              <section class="stats" aria-label="统计">
                <div class="stat"><strong id="groupCount">11</strong><span id="groupLabel">宠物记录组</span></div>
                <div class="stat"><strong id="shotCount">22</strong><span id="shotLabel">截图来源</span></div>
                <div class="stat"><strong id="pendingCount">0</strong><span id="pendingLabel">含待确认记录组</span></div>
                <div class="stat"><strong id="folderName">FC</strong><span id="folderLabel">当前目录</span></div>
              </section>
            </section>

            <p id="notice" class="notice" hidden></p>

            <section id="records" class="grid" aria-live="polite"></section>
          </div>
        </section>
      </section>
    </main>

    <script src="./pet-recognition-data.js"></script>
    <script src="./pet-recognition-beast.js"></script>
    <script src="./pet-recognition-app.js"></script>
  </body>
</html>
